name: Deploy DEV

on:
  push:
    branches: ["dev"]

  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Zip Lambdas
        run: |
          cd lambdas
          zip -r auth.zip auth/
          zip -r vote.zip vote/

      - name: Build CSV Lambda ZIP
        run: |
          mkdir -p infra/build
          cd lambdas/csv
          zip csv_lambda.zip csv_lambda.js
          mv csv_lambda.zip ../infra/build/

      - name: Verify ZIP
        run: |
          ls -R infra/build
                
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd infra
          terraform init

      - name: Select Workspace
        run: |
          cd infra
          terraform workspace select dev || terraform workspace new dev

      - name: Terraform Plan
        run: |
          cd infra
          terraform plan

      - name: Terraform Apply or Destroy
        run: |
          cd infra
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            terraform destroy -auto-approve
          else
            terraform apply -auto-approve
          fi
