<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RWA Voting - Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page-container">
    <header class="page-header">
      <h1>RWA Voting</h1>
      <p>Secure community voting made simple.</p>
    </header>

    <main class="card">
      <h2>Request OTP</h2>
      <p>Enter your registered email address to receive a one-time password.</p>
      <form action="/send-otp" method="POST" class="form-grid">
        <label>
          Email address
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <button type="submit" class="btn-primary">Send OTP</button>
      </form>
    </main>

    <footer class="page-footer">
      <p>Already have an OTP? <a href="/">Enter it after requesting one.</a></p>
    </footer>
  </div>
</body>
</html>
