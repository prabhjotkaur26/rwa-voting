<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RWA Voting - Cast Your Vote</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page-container">
    <header class="page-header">
      <h1>Cast Your Vote</h1>
      <p>Logged in as <strong>{{ email }}</strong>. Choose a candidate for President.</p>
    </header>

    <main class="card vote-grid">
      <form method="POST" class="vote-form">
        <button name="candidate" value="Candidate A" class="btn-option">
          <span>Candidate A</span>
          <small>Community Leader</small>
        </button>
        <button name="candidate" value="Candidate B" class="btn-option">
          <span>Candidate B</span>
          <small>Community Organizer</small>
        </button>
      </form>
    </main>

    <footer class="page-footer">
      <a href="/logout">Logout</a>
    </footer>
  </div>
</body>
</html>
