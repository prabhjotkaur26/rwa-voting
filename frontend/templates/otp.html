<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RWA Voting - Verify OTP</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page-container">
    <header class="page-header">
      <h1>Verify OTP</h1>
      <p>Check your inbox and enter the code sent to <strong>{{ email }}</strong>.</p>
    </header>

    <main class="card">
      <form action="/verify-otp" method="POST" class="form-grid">
        <input type="hidden" name="email" value="{{ email }}">

        <label>
          One-time password
          <input type="text" name="otp" placeholder="123456" maxlength="6" required>
        </label>

        <button type="submit" class="btn-primary">Verify OTP</button>
      </form>
    </main>

    <footer class="page-footer">
      <a href="/">Back to login</a>
    </footer>
  </div>
</body>
</html>
