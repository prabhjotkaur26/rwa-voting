<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RWA Voting - Results</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page-container">
    <header class="page-header">
      <h1>Election Results</h1>
      <p>Current voting totals from the live election.</p>
    </header>

    <main class="card results-card">
      {% if results %}
        <table class="results-table">
          <thead>
            <tr>
              <th>Option</th>
              <th>Votes</th>
            </tr>
          </thead>
          <tbody>
            {% for key, value in results.items() %}
              <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      {% else %}
        <p class="empty-state">No voting results are available yet.</p>
      {% endif %}
    </main>

    <footer class="page-footer">
      <a href="/vote">Back to vote</a>
      <a href="/logout">Logout</a>
    </footer>
  </div>
</body>
</html>
